<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller 3</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <section>
        <div>
            <label for="pokemons">ELige tu Pokemón</label>
            <select id="pokemons" onchange="pokemonSelected(this.value)">
            <option value="">Select a Pokemon</option>
        </select>
        </div>

        <div id="pokemon-info">
            <h1 id="pokemon-name"></h1>
            <div class="pokemon-card">
                <img id="pokemon-image" alt="Imagen del Pokémon">
                <p id="pokemon-type" class="pokemon-type"></p>
            </div>
            <h3>Estadísticas:</h3>
            <ul id="pokemon-stats"></ul>
            <h3>Habilidades:</h3>
            <ul id="pokemon-abilities"></ul>
        </div>
    </section>
</body>
</html>
